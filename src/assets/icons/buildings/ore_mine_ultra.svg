<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Diamond / gem -->
  <!-- Top facets -->
  <polygon points="8,1 12,5 8,5 4,5" fill="#67e8f9" stroke="#0891b2" stroke-width="0.5"/>
  <!-- Left facet -->
  <polygon points="4,5 8,5 5,12" fill="#22d3ee" stroke="#0891b2" stroke-width="0.5"/>
  <!-- Right facet -->
  <polygon points="12,5 8,5 11,12" fill="#06b6d4" stroke="#0891b2" stroke-width="0.5"/>
  <!-- Center bottom -->
  <polygon points="8,5 5,12 8,15 11,12" fill="#0891b2" stroke="#0e7490" stroke-width="0.5"/>
  <!-- Shine highlight -->
  <line x1="6" y1="2.5" x2="7" y2="4.5" stroke="white" stroke-width="0.75" opacity="0.8" stroke-linecap="round"/>
</svg>
