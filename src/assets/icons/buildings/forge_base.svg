<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Forge - crossed hammer and pick -->
  <!-- Hammer handle -->
  <line x1="3" y1="13" x2="10" y2="6" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hammer head -->
  <rect x="9" y="3" width="5" height="3" rx="0.5" fill="#6b7280" stroke="#374151" stroke-width="0.5" transform="rotate(-45 11.5 4.5)"/>
  <!-- Pick handle -->
  <line x1="13" y1="13" x2="6" y2="6" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pick head -->
  <path d="M3.5,4.5 L6,3 L7,6 L4,5.5 Z" fill="#6b7280" stroke="#374151" stroke-width="0.4"/>
</svg>
