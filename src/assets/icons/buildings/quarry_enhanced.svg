<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Brick wall -->
  <rect x="1" y="2" width="14" height="12" fill="#d97706" stroke="#b45309" stroke-width="0.5"/>
  <!-- Mortar lines horizontal -->
  <line x1="1" y1="5.5" x2="15" y2="5.5" stroke="#b45309" stroke-width="0.75"/>
  <line x1="1" y1="9" x2="15" y2="9" stroke="#b45309" stroke-width="0.75"/>
  <line x1="1" y1="12.5" x2="15" y2="12.5" stroke="#b45309" stroke-width="0.75"/>
  <!-- Mortar lines vertical row 1 -->
  <line x1="8" y1="2" x2="8" y2="5.5" stroke="#b45309" stroke-width="0.75"/>
  <!-- Mortar lines vertical row 2 (offset) -->
  <line x1="4.5" y1="5.5" x2="4.5" y2="9" stroke="#b45309" stroke-width="0.75"/>
  <line x1="11.5" y1="5.5" x2="11.5" y2="9" stroke="#b45309" stroke-width="0.75"/>
  <!-- Mortar lines vertical row 3 -->
  <line x1="8" y1="9" x2="8" y2="12.5" stroke="#b45309" stroke-width="0.75"/>
</svg>
