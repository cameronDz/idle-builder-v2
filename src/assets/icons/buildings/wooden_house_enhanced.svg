<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Cosy house with chimney and tree -->
  <!-- Roof -->
  <polygon points="1,7 15,7 8,2" fill="#b45309" stroke="#92400e" stroke-width="0.5"/>
  <!-- Chimney -->
  <rect x="10" y="2.5" width="2" height="4" fill="#9ca3af" stroke="#6b7280" stroke-width="0.4"/>
  <!-- Walls -->
  <rect x="2" y="7" width="12" height="8" fill="#fef3c7" stroke="#d97706" stroke-width="0.5"/>
  <!-- Door -->
  <rect x="6" y="10" width="4" height="5" fill="#92400e"/>
  <!-- Window -->
  <rect x="3" y="8" width="2.5" height="2.5" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.4"/>
  <!-- Small tree beside house -->
  <circle cx="14.5" cy="11" r="2" fill="#22c55e"/>
  <rect x="14" y="13" width="1" height="2" fill="#92400e"/>
</svg>
