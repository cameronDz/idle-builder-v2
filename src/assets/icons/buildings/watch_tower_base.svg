<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Watch tower - tall narrow structure -->
  <!-- Base platform -->
  <rect x="4" y="13" width="8" height="2" fill="#6b7280" stroke="#374151" stroke-width="0.5"/>
  <!-- Tower body (tapering) -->
  <polygon points="5,13 11,13 10,4 6,4" fill="#9ca3af" stroke="#6b7280" stroke-width="0.5"/>
  <!-- Top cabin/platform -->
  <rect x="4.5" y="2" width="7" height="3" fill="#6b7280" stroke="#374151" stroke-width="0.5"/>
  <!-- Battlements -->
  <rect x="4.5" y="1" width="1.5" height="1.5" fill="#374151"/>
  <rect x="7.25" y="1" width="1.5" height="1.5" fill="#374151"/>
  <rect x="10" y="1" width="1.5" height="1.5" fill="#374151"/>
  <!-- Ladder -->
  <line x1="7.5" y1="5" x2="7.5" y2="13" stroke="#374151" stroke-width="0.5"/>
  <line x1="8.5" y1="5" x2="8.5" y2="13" stroke="#374151" stroke-width="0.5"/>
  <line x1="7.5" y1="7" x2="8.5" y2="7" stroke="#374151" stroke-width="0.5"/>
  <line x1="7.5" y1="9" x2="8.5" y2="9" stroke="#374151" stroke-width="0.5"/>
  <line x1="7.5" y1="11" x2="8.5" y2="11" stroke="#374151" stroke-width="0.5"/>
</svg>
