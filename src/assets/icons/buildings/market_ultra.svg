<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Bank with columns and pediment -->
  <!-- Pediment (triangle roof) -->
  <polygon points="1,5 15,5 8,1" fill="#d1d5db" stroke="#9ca3af" stroke-width="0.5"/>
  <!-- Main body -->
  <rect x="2" y="5" width="12" height="10" fill="#e5e7eb" stroke="#9ca3af" stroke-width="0.5"/>
  <!-- Columns -->
  <rect x="3" y="5" width="1.5" height="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.4"/>
  <rect x="6.5" y="5" width="1.5" height="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.4"/>
  <rect x="10" y="5" width="1.5" height="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.4"/>
  <!-- Door -->
  <rect x="6.5" y="10" width="3" height="5" fill="#374151"/>
  <!-- Dollar sign -->
  <text x="8" y="9" font-size="4" text-anchor="middle" fill="#d97706" font-family="serif" font-weight="bold">$</text>
</svg>
