<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Torii gate (shrine gate) -->
  <!-- Left post -->
  <rect x="2.5" y="5" width="2" height="10" fill="#dc2626" stroke="#b91c1c" stroke-width="0.4"/>
  <!-- Right post -->
  <rect x="11.5" y="5" width="2" height="10" fill="#dc2626" stroke="#b91c1c" stroke-width="0.4"/>
  <!-- Top crossbeam (kasagi - extends past posts) -->
  <rect x="1" y="2.5" width="14" height="2" fill="#dc2626" stroke="#b91c1c" stroke-width="0.4"/>
  <!-- Slight upturn at ends (curved effect via thin wedge) -->
  <polygon points="1,2.5 2.5,2.5 2.5,4.5 1,4" fill="#b91c1c"/>
  <polygon points="13.5,2.5 15,2.5 15,4 13.5,4.5" fill="#b91c1c"/>
  <!-- Second crossbeam (shimagi) -->
  <rect x="3" y="5" width="10" height="1.5" fill="#dc2626" stroke="#b91c1c" stroke-width="0.4"/>
  <!-- Ground line -->
  <line x1="1" y1="15" x2="15" y2="15" stroke="#6b7280" stroke-width="1"/>
</svg>
