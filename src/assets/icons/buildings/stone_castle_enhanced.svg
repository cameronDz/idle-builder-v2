<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Japanese castle / pagoda tower -->
  <!-- Ground floor -->
  <rect x="2" y="11" width="12" height="4" fill="#9ca3af" stroke="#6b7280" stroke-width="0.5"/>
  <!-- Ground floor eave -->
  <polygon points="1,11 15,11 13,10 3,10" fill="#374151"/>
  <!-- Middle floor -->
  <rect x="3.5" y="7" width="9" height="4" fill="#6b7280" stroke="#4b5563" stroke-width="0.5"/>
  <!-- Middle eave -->
  <polygon points="2,7 14,7 12,6 4,6" fill="#374151"/>
  <!-- Top floor -->
  <rect x="5.5" y="4" width="5" height="3" fill="#4b5563" stroke="#374151" stroke-width="0.5"/>
  <!-- Top eave -->
  <polygon points="4,4 12,4 11,3 5,3" fill="#374151"/>
  <!-- Spire -->
  <polygon points="8,1 9,3 7,3" fill="#d97706"/>
  <!-- Door -->
  <rect x="6.5" y="13" width="3" height="2" fill="#1f2937"/>
</svg>
