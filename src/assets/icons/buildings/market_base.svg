<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Market/shop with awning -->
  <rect x="2" y="6" width="12" height="9" fill="#fef3c7" stroke="#d97706" stroke-width="0.5"/>
  <!-- Awning -->
  <rect x="1" y="5" width="14" height="2.5" fill="#ef4444" stroke="#b91c1c" stroke-width="0.5"/>
  <line x1="4" y1="5" x2="4" y2="7.5" stroke="#b91c1c" stroke-width="0.5"/>
  <line x1="7" y1="5" x2="7" y2="7.5" stroke="#b91c1c" stroke-width="0.5"/>
  <line x1="10" y1="5" x2="10" y2="7.5" stroke="#b91c1c" stroke-width="0.5"/>
  <line x1="13" y1="5" x2="13" y2="7.5" stroke="#b91c1c" stroke-width="0.5"/>
  <!-- Door -->
  <rect x="6" y="10" width="4" height="5" fill="#92400e"/>
  <!-- Windows -->
  <rect x="3" y="8" width="2.5" height="2" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.4"/>
  <rect x="10.5" y="8" width="2.5" height="2" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.4"/>
</svg>
